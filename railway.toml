# Single Railway service: builds the portal (frontend) + backend, then the backend
# serves the portal AND the API on one domain (productivity.techlogicservices.co.uk).
# Build/install/start phases live in nixpacks.toml (which also forces a Node-only
# build so the C# agent doesn't trigger a .NET build).
[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"

# Node-only build. The C# agent (agent-windows/*.csproj) is built separately on
# Windows — without this, nixpacks auto-detects .NET and a stray `dotnet restore`
# fails the build.
providers = ["node"]

[phases.install]
cmds = [
  "npm --prefix frontend ci",
  "npm --prefix backend ci",
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",
  "cd backend && npx prisma generate",
]

# db push + seeds are best-effort (|| true) so a DB/seed hiccup never stops the
# server from booting — the health check then passes and the real error shows in
# the deploy logs instead of a silent crash-loop.
[start]
cmd = "cd backend && (npx prisma db push || true) && (node prisma/seed-monitoring.js || true) && (node prisma/portal-bootstrap.js || true) && node src/index.js"

name: Build & release Windows agent

# Push a version tag (e.g. v0.2.0) to build the agent and publish a GitHub release
# with ProductivityAgent.exe attached. The backend's AGENT_DOWNLOAD_URL points at
# .../releases/latest/download/ProductivityAgent.exe, so it always serves the newest.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish agent (win-x64, self-contained single file)
        run: dotnet publish agent-windows/ProductivityAgent.csproj -c Release -r win-x64 -o publish

      - name: Publish GitHub release with the exe
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ProductivityAgent.exe
          generate_release_notes: true
